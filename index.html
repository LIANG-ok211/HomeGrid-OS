<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HomeGrid OS</title><style>body{margin:0;font-family:system-ui;background:radial-gradient(circle at top,#0b1a14,#05070f);color:#eafff3;overflow-x:hidden}body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,rgba(124,255,178,0.12),transparent 50%),radial-gradient(circle at 80% 70%,rgba(120,180,255,0.10),transparent 50%);animation:floatBg 8s ease-in-out infinite alternate;pointer-events:none}@keyframes floatBg{from{transform:scale(1)}to{transform:scale(1.05)}}nav{display:flex;gap:8px;padding:12px 14px;position:sticky;top:0;background:rgba(10,20,18,0.6);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.05);z-index:100}nav button{border:0;padding:10px 14px;border-radius:12px;cursor:pointer;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);font-weight:500;font-size:13px;transition:all 0.25s;font-family:inherit}nav button:hover{background:rgba(255,255,255,0.1)}nav button.act{background:linear-gradient(135deg,#7CFFB2,#A8E6CF);font-weight:600;color:#0b1a14}.page{display:none;padding:20px;max-width:480px;margin:0 auto}.page.act{display:block}h2{font-size:20px;font-weight:600;margin-bottom:4px}h2 em{font-style:normal;opacity:0.5;font-size:13px;font-weight:400}.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:16px;margin-bottom:10px;transition:all 0.3s}.card .lbl{font-size:13px;opacity:0.5;margin-bottom:2px}.card .val{font-size:26px;font-weight:700;color:#7CFFB2}.card .sub{font-size:12px;opacity:0.35;margin-top:2px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g2 .card{margin-bottom:0}.device{display:flex;justify-content:space-between;align-items:center;padding:12px;margin-bottom:8px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);transition:all 0.3s}.device .di{font-size:14px;font-weight:500}.device .ds{font-size:11px;opacity:0.4;margin-top:2px}.device .de{font-size:11px;color:#7CFFB2;margin-top:1px}button{border:0;padding:7px 12px;border-radius:10px;cursor:pointer;background:#1f2a44;color:#fff;font-size:12px;font-family:inherit;transition:all 0.2s}button:hover{filter:brightness(1.15)}button:disabled{opacity:0.3;cursor:not-allowed;filter:none}.on{background:#7CFFB2;color:#0b1a14}.aiBox{padding:16px;border-radius:14px;background:rgba(124,255,178,0.06);border:1px solid rgba(124,255,178,0.12);margin-bottom:10px}.aiBox .msg{font-size:16px;line-height:1.5}.aiBox .tag{font-size:11px;opacity:0.4;margin-top:6px}.log{max-height:180px;overflow-y:auto;margin-top:8px}.log div{font-size:12px;opacity:0.5;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03)}.log div:first-child{opacity:0.8;color:#7CFFB2}.dlog{margin-top:16px}.dlog .dh{font-size:12px;opacity:0.35;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}.dlog .dr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px}.dlog .dr .dd{opacity:0.5}.dlog .dr .dv{color:#7CFFB2;font-weight:500}.dlog .dr .dx{background:none;border:none;color:rgba(255,255,255,0.15);cursor:pointer;font-size:15px;padding:0 4px;transition:color 0.2s}.dlog .dr .dx:hover{color:#ff6b6b}.dlog .empty{font-size:12px;opacity:0.2;text-align:center;padding:16px 0}.btn-sm{width:100%;padding:10px;font-size:13px;margin-top:8px}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}</style></head><body><nav><button class="act" onclick="nav('dash')">🌿 能源</button><button onclick="nav('ai')">🤖 AI</button><button onclick="nav('home')">🏠 家电</button></nav><div id="dash" class="page act"><h2>🌿 能源状态 <em>实时</em></h2><div class="g2"><div class="card"><div class="lbl">☀️ 太阳能</div><div class="val" id="solar"></div><div class="sub" id="solarTrend"></div></div><div class="card"><div class="lbl">🔋 储能</div><div class="val" id="battery"></div><div class="sub" id="batteryTrend"></div></div><div class="card"><div class="lbl">⚡ 家庭消耗</div><div class="val" id="usage"></div><div class="sub" id="usageDetail"></div></div><div class="card"><div class="lbl">🌍 生态贡献</div><div class="val" id="eco"></div><div class="sub">累计碳减排</div></div></div><div class="card"><div class="lbl" id="moodIcon">🌿</div><div style="font-size:15px;font-weight:500" id="moodText"></div><div class="sub" id="moodDetail"></div></div></div><div id="ai" class="page"><h2>🤖 AI 能源管家 <em>策略分析</em></h2><div class="aiBox"><div class="msg" id="aiText">正在分析能源数据...</div><div class="tag" id="aiTag">等待指令</div></div><button onclick="runAI()" style="width:100%;padding:10px">生成能源策略</button><div style="margin-top:12px;font-size:12px;opacity:0.35">策略记录</div><div class="log" id="aiLog"></div></div><div id="home" class="page"><h2>🏠 家电监控 <em>实时功耗</em></h2><div id="devices"></div><div class="card"><div class="lbl">⚡ 实时总功率</div><div class="val" id="total"></div></div><div class="card"><div class="lbl">🔋 累计耗电（今日）</div><div class="val" id="totalEnergy" style="font-size:20px"></div></div><button class="btn-sm" onclick="resetToday()" style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6)">🔄 重置今日数据</button><div class="dlog"><div class="dh"><span>📋 每日用电记录</span><span style="font-size:10px;opacity:0.4">前天自动清零</span></div><div id="dailyLog"></div></div></div><script>var state={solar:3,battery:70,usage:1.5,eco:4,devices:[{name:"空调",power:1500,on:false,runtime:0,energy:0},{name:"冰箱",power:120,on:true,runtime:0,energy:0},{name:"照明",power:300,on:true,runtime:0,energy:0},{name:"电视",power:200,on:false,runtime:0,energy:0}]};var aiMode="BALANCE",aiLog=[],intv=null;var navBtns,curPage="dash";var dailyLog=JSON.parse(localStorage.getItem("hg_daily")||"[]");var lastDate=localStorage.getItem("hg_date")||"";var todayStr=new Date().toISOString().slice(0,10);function checkDate(){var now=new Date();var today=now.toISOString().slice(0,10);if(lastDate&&lastDate!==today){var total=getTotalEnergy();dailyLog.unshift({date:lastDate,total:total,id:Date.now()});if(dailyLog.length>30)dailyLog.pop();saveLog();state.devices.forEach(function(d){d.energy=0;d.runtime=0})}lastDate=today;localStorage.setItem("hg_date",today)}function saveLog(){localStorage.setItem("hg_daily",JSON.stringify(dailyLog))}function getTotalEnergy(){var s=0;for(var i=0;i<state.devices.length;i++)s+=state.devices[i].energy;return+s.toFixed(3)}function nav(p){document.querySelectorAll(".page").forEach(function(e){e.classList.remove("act")});document.getElementById(p).classList.add("act");if(!navBtns)navBtns=document.querySelectorAll("nav button");navBtns.forEach(function(b){b.classList.toggle("act",b.getAttribute("onclick").indexOf('"'+p+'"')>=0)});curPage=p;if(p==="home")renderDailyLog()}function updateSolar(){state.solar+=(Math.random()-0.5)*0.3;state.solar=Math.max(0.2,Math.min(6,state.solar.toFixed(2)))}function getPower(){var s=0;for(var i=0;i<state.devices.length;i++){if(state.devices[i].on)s+=state.devices[i].power}return s}function updateUsage(){var base=0.8+Math.random()*1.2;var dev=getPower()/1000;state.usage=+(base+dev).toFixed(2)}function updateEnergy(){var c=getPower()/1000;var net=state.solar-(state.usage||1);state.battery+=net*2.5;state.battery=Math.max(0,Math.min(100,state.battery));state.eco=+(state.eco+0.03).toFixed(2)}function updateDevices(){for(var i=0;i<state.devices.length;i++){var d=state.devices[i];if(d.on){d.runtime+=2.5;d.energy=+(d.energy+(d.power*2.5)/3600).toFixed(4)}}}function updateAI(){var c=getPower()/1000;var net=state.solar-(state.usage||1);if(state.battery<30||net<-1.5)aiMode="SAVE";else if(state.battery>80&&net>1.5)aiMode="SURPLUS";else aiMode="BALANCE";for(var i=0;i<state.devices.length;i++){var d=state.devices[i];if(d.name==="冰箱")continue;if(aiMode==="SAVE"&&d.power>800)d.on=false;if(aiMode==="BALANCE"&&d.power>1200)d.on=false}}function runAI(){var c=getPower()/1000;var net=state.solar-(state.usage||1);var msg,detail;if(aiMode==="SURPLUS"){msg="☀️ 今天阳光很好，能源充足";detail="建议：可自由使用家电，多余电力可出售"}else if(aiMode==="SAVE"){msg="🌙 当前能源偏紧，已自动关闭高功率设备";detail="建议：减少非必要用电，优先储能"}else{msg="🌿 能源供需平衡，系统稳定运行";detail="建议：保持当前状态，注意天气变化"}document.getElementById("aiText").innerText=msg;document.getElementById("aiTag").innerText=detail;aiLog.unshift({time:new Date().toLocaleTimeString(),msg:msg,mode:aiMode});if(aiLog.length>20)aiLog.pop();renderLog()}function renderLog(){var box=document.getElementById("aiLog");box.innerHTML=aiLog.map(function(l){return "<div><span style=\"opacity:0.4;margin-right:6px\">"+l.time+"</span>"+l.msg+"</div>"}).join("")}function renderDailyLog(){var box=document.getElementById("dailyLog");if(!box)return;if(dailyLog.length===0){box.innerHTML="<div class=\"empty\">暂无记录</div>";return}box.innerHTML=dailyLog.map(function(e,i){return "<div class=\"dr\"><span class=\"dd\">"+e.date+"</span><span class=\"dv\">"+e.total+" kWh</span><button class=\"dx\" onclick=\"delLog("+i+")\">\u00d7</button></div>"}).join("")}function delLog(i){dailyLog.splice(i,1);saveLog();renderDailyLog()}function resetToday(){if(confirm("重置今日数据？")){state.devices.forEach(function(d){d.energy=0;d.runtime=0})}}function render(){document.getElementById("solar").innerText=state.solar+" kW";var bt=state.battery;document.getElementById("battery").innerText=bt.toFixed(1)+" %";document.getElementById("usage").innerText=state.usage+" kW";document.getElementById("eco").innerText="+"+state.eco+" kg";var c=getPower()/1000;var net=state.solar-(state.usage||1);var mood,icon,detail;if(net>1.5){mood="能源充沛";icon="☀️";detail="太阳能超出家庭需求"}else if(net>0.5){mood="能源盈余";icon="🌤";detail="发电量大于消耗"}else if(net>-0.5){mood="供需平衡";icon="🌿";detail="发电与消耗基本持平"}else if(net>-1.5){mood="能源偏紧";icon="🌙";detail="消耗大于发电，正在调用储能"}else{mood="能源紧张";icon="⚡";detail="储能快速下降，注意节约用电"}document.getElementById("moodIcon").innerText=icon;document.getElementById("moodText").innerText=mood;document.getElementById("moodDetail").innerText=detail;document.getElementById("solarTrend").innerText="设备总功率 "+c.toFixed(2)+" kW";document.getElementById("batteryTrend").innerText=net>=0?"充电中":"放电中";document.getElementById("usageDetail").innerText="含设备 "+c.toFixed(2)+" kW";var box=document.getElementById("devices");if(box&&curPage==="home"){box.innerHTML="";for(var i=0;i<state.devices.length;i++){var d=state.devices[i];var lock=aiMode==="SAVE"&&d.power>800;box.innerHTML+="<div class=\"device\"><div><div class=\"di\">"+d.name+"</div><div class=\"ds\">⚡ "+d.power+"W · ⏱ "+(d.runtime/60).toFixed(1)+"min</div><div class=\"de\">🔋 "+d.energy.toFixed(3)+" kWh</div></div>";box.innerHTML+="<button onclick=\"toggle("+i+")\" class=\""+(d.on?"on":"")+"\""+(lock?" disabled":"")+">"+(lock?"AI关闭":(d.on?"运行中":"关闭"))+"</button></div>"}}var tp=document.getElementById("total");if(tp)tp.innerText=getPower()+" W";var te=document.getElementById("totalEnergy");if(te)te.innerText=getTotalEnergy()+" kWh"}function toggle(i){state.devices[i].on=!state.devices[i].on}function loop(){checkDate();updateSolar();updateUsage();updateEnergy();updateDevices();updateAI();render();if(curPage==="home")renderDailyLog()}if(intv)clearInterval(intv);intv=setInterval(loop,2500);loop();</script></body></html>
